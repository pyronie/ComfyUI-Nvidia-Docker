# WiP: it runs without OOM when used in conjunction with extras/dgx_spark-helper.sh but it's not stable
# ComfyUI still freezes at random location (different nodes at times) when using v8 of https://github.com/mmartial/ComfyUI_misc/tree/main/ComfyUI-Workflows
#
# This is using a custom build on the DGX Spark; using: make build-dgx
services:
  comfyui-nvidia:
    image: mmartial/comfyui-nvidia-docker:ubuntu24_cuda13.1-dgx
    container_name: comfyui-nvidia
    ports:
      - 8188:8188
    volumes:
      # . is relative to /opt/stacks if you installed using Dockge
      - ./userscripts_dir:/userscripts_dir
      # recommended scripts (only showing the userscripts_dir number, make sure to chmod +x the ones you want to use)
      # 00, 05, 10, 11, 12, 14, 15, 20, 21 
      - ./run:/comfy/mnt
      - ./basedir:/basedir
#      - /opt/stacks/comfyui/extra_model_paths.yaml:/extra_model_paths.yaml:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
#    extra_hosts:
#      - ollama.internal:10.12.13.14 # method to add extra hosts to the container for external services (useful for Ollama's node: use http://ollama.internal:11434)
    environment:
      PREINSTALL_TORCH_CMD: torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cu130
      TORCH_CUDA_ARCH_LIST: "12.1"
      WANTED_UID: "1000"
      WANTED_GID: "1000"
      BASE_DIRECTORY: /basedir
      USE_NEW_MANAGER: "true"
      ENABLE_MANAGER_LEGACY_UI: "true"
      SECURITY_LEVEL: weak # adapt as prefered
      COMFY_CMDLINE_EXTRA: --use-sage-attention --bf16-unet --bf16-vae --bf16-text-enc
      # --extra-model-paths-config=/extra_model_paths.yaml
      # --front-end-version Comfy-Org/ComfyUI_frontend@latest 
      # the above is due to https://github.com/Comfy-Org/ComfyUI_frontend/issues/8986
      NVIDIA_VISIBLE_DEVICES: all
      # ^ need video for libnvvcuvid.so
      USE_UV: "true"
      # userscripts_dir
      FORCE_REINSTALL: "true"
      ONNXRUNTIME_DO_NOT_DELETE_GPU_IF_PRESENT: "true"
      CUDA_HOME: /usr/local/cuda
      # https://forums.developer.nvidia.com/t/unlocking-the-power-of-the-spark-in-comfyui-no-crashes/360336
      CUDA_CACHE_MAXSIZE: "4294967296" # 4GB kernel cache = 3x rerun speedup
      NCCL_P2P_DISABLE: "1" # single GPU, skip NCCL
      # HF
      HF_TOKEN: ${HF_TOKEN} # set your huggingface token to avoid rate limiting in the .env file (do not expose secrets)
      HF_HUB_DISABLE_TELEMETRY: "true"
    # Using PyTorch recommended settings: removes the limit on locked-in-memory pages for processes in the container + sets the process stack size limit to 64 MiB
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
                - compute
                - utility

